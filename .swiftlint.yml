included:
  - ui/Tether
  - ui/Sources

excluded:
  - ui/.build
  - ui/Tether.xcodeproj
  - ui/Sources/Core/Models/AgentNode.swift
  - ui/Sources/Networking/TraceAPIClient.swift
  - ui/Tether/Features/Graph/Viewport/GraphGeometry.swift
  - ui/Tether/Features/Inspector/Content/InspectorBody.swift
  - ui/Tether/Features/MainLayout/Layout/MainThreePaneActions.swift
  - ui/Tether/Features/MainLayout/Stores/TraceStore.swift

only_rules:
  - file_length
  - function_body_length
  - type_body_length
  - trailing_whitespace

file_length:
  warning: 200
  error: 220

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 180
  error: 220
